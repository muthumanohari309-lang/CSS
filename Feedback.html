<!DOCTYPE html>
<html>
<head>
    <title>Survey Form</title>
</head>
<body>
    <h2>User Feedback Form</h2>
    <form action="#">
        <!-- Dropdown Selector Menu -->
        <label>Select Experience Tier:</label>
        <select name="tier">
            <option value="beginner">Beginner Level</option>
            <option value="expert">Expert Level</option>
        </select>
        <br><br>

        <!-- Radio Selection Dots -->
        <label>Would you recommend this?</label><br>
        <input type="radio" id="yes" name="rec" value="Yes">
        <label for="yes">Yes</label><br>
        <input type="radio" id="no" name="rec" value="No">
        <label for="no">No</label>
        <br><br>

        <!-- Descriptive Commentary Textarea -->
        <label>Additional Notes:</label><br>
        <textarea name="notes" rows="4" cols="30"></textarea>
        <br><br>

        <input type="submit" value="Send Review">
    </form>
</body>
</html>
